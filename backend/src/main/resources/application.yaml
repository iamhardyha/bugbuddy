spring:
  # DataSource
  datasource:
    hikari:
      maximum-pool-size: 4
    url: ${BUGBUDDY_DB_URL}?serverTimeZone=Asia/Seoul # jdbc:mysql://localhost:3306/bugbuddy
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${BUGBUDDY_DB_USERNAME}
    password: ${BUGBUDDY_DB_PASSWORD}
  # JPA
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  # Oauth
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${BUGBUDDY_CLIENT_ID}
            client-secret: ${BUGBUDDY_CLIENT_SECRET}
            scope: read:user
            redirect-url: "{baseUrl}/login/oauth2/code/{registrationId}"
      provider:
        github:
          authorization-uri: https://github.com/login/oauth/authorize
          token-uri: https://github.com/login/oauth/access_token
          user-info-uri: https://api.github.com/user

app:
  frontend-url: ${BUGBUDDY_FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${BUGBUDDY_JWT_SECRET}
    access-token-expiration: 3600000     # 1시간
    refresh-token-expiration: 604800000  # 7일
  s3:
    endpoint: ${BUGBUDDY_S3_ENDPOINT:http://localhost:9000}   # MinIO(local) or R2(prod)
    region: ${BUGBUDDY_S3_REGION:ap-northeast-2}
    access-key: ${BUGBUDDY_S3_ACCESS_KEY:minioadmin}
    secret-key: ${BUGBUDDY_S3_SECRET_KEY:minioadmin}
    bucket: ${BUGBUDDY_S3_BUCKET:bugbuddy-uploads}
    public-base-url: ${BUGBUDDY_S3_PUBLIC_BASE_URL:http://localhost:9000/bugbuddy-uploads}
    max-file-size: 10485760  # 10MB
